<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso - Sistema Escolar</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body>

    <div class="glass-panel">
        
        <div id="seccionLogin">
            <h2><i class="fa-solid fa-user-lock" style="color: #6366f1; margin-right: 10px;"></i>INICIAR SESIÓN</h2>
            <form id="loginForm">
                <input type="text" id="loginUser" placeholder="Usuario" required>
                <input type="password" id="loginPass" placeholder="Contraseña" required>
                <button type="submit">ENTRAR</button>
            </form>
            <span class="toggle-link" onclick="alternarFormularios()">¿No tienes cuenta? Regístrate aquí</span>
        </div>

        <div id="seccionRegistro" class="oculto">
            <h2><i class="fa-solid fa-user-plus" style="color: #10b981; margin-right: 10px;"></i>CREAR CUENTA</h2>
            <form id="registroForm">
                <input type="text" id="regUser" placeholder="Nuevo Usuario" required>
                <input type="password" id="regPass" placeholder="Nueva Contraseña" required>
                <button type="submit" class="btn-registro">REGISTRARME</button>
            </form>
            <span class="toggle-link" onclick="alternarFormularios()">¿Ya tienes cuenta? Inicia sesión</span>
        </div>

        <div id="mensaje"></div>
    </div>

    <script src="js/auth.js"></script>
</body>
</html>
